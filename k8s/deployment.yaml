# Triage agent Deployment for the net-triage-agent namespace.
#
# Singleton workload: it polls Splunk and posts to Teams on a fixed cadence.
# Running two replicas would double every alert, so replicas is pinned to 1
# and the update strategy is Recreate (never run two pods at once, even
# briefly during a rollout).
#
# Logs: the agent emits JSONL on stdout. The cluster's Splunk OTel Collector
# agent DaemonSet scrapes container stdout automatically — no log wiring here.
#
# Prereqs (see k8s/README.md):
#   - Secret    `kl-triage-secrets`  — credentials + Splunk MCP connection
#   - ConfigMap `kl-triage-config`   — SOUL.md + store_registry.json
#   - Image pushed to localhost:5000/kl-triage-agent:latest
#   - Image pushed to localhost:5000/kl-defenseclaw-sidecar:latest  (shared with kl-governance)
#
# DefenseClaw sidecar (added 2026-05-17 — task #23, Path D): colocated
# observe-only, no interception of the agent's MCP/LLM/HTTP calls. The
# sidecar runs the gateway daemon but nothing on this pod connects to it
# yet — this gets the deployment topology right for future Path B′ work
# (runtime governance via a thin MCP proxy in the sidecar) which lands
# after the LangChain/LangGraph refactor. See task #34.
---
# DefenseClaw sidecar state — gateway's auto-generated token + .env + scan DB.
# Mirror of kl-governance/k8s/deployment.yaml's defenseclaw-state PVC.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: defenseclaw-state
  namespace: net-triage-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kl-triage-agent
  namespace: net-triage-agent
  labels:
    app: kl-triage-agent
    component: triage
spec:
  replicas: 1
  strategy:
    type: Recreate          # singleton — never overlap two pods
  selector:
    matchLabels:
      app: kl-triage-agent
  template:
    metadata:
      labels:
        app: kl-triage-agent
        component: triage
    spec:
      terminationGracePeriodSeconds: 30   # agent handles SIGTERM -> emits agent.stop
      # The DefenseClaw PVC is freshly provisioned with root ownership.
      # Sidecar runs as uid 10002; without this, mount is unwritable.
      # (Pattern reused from kl-governance/k8s/deployment.yaml.)
      initContainers:
        - name: fix-defenseclaw-perms
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              chown -R 10002:10002 /defenseclaw-state
              echo "ownership fixed"
              ls -la /defenseclaw-state
              # Task #69a: the usage-spool emptyDir (medium: Memory) is a tmpfs
              # mounted 1777 (world-writable + STICKY) like /tmp. The agent (uid
              # 10001) writes the spool files; the sidecar (uid 10002) drains +
              # deletes them — but the sticky bit forbids deleting another
              # user's files, so the relay re-POSTs the same files forever
              # (duplicate usage events). chmod 0777 clears the sticky bit so the
              # sidecar can unlink the agent's files. Both uids stay non-root.
              chmod 0777 /usage-spool
              echo "usage-spool sticky bit cleared"; ls -ld /usage-spool
          securityContext:
            runAsUser: 0      # needs root to chown
          volumeMounts:
            - name: defenseclaw-state
              mountPath: /defenseclaw-state
            - name: usage-spool
              mountPath: /usage-spool
      containers:
        - name: triage-agent
          image: localhost:5000/kl-triage-agent:latest
          imagePullPolicy: Always
          # Credentials + Splunk MCP connection string (incl. the bearer token).
          envFrom:
            - secretRef:
                name: kl-triage-secrets
          # Non-secret behaviour tuning. Adjust freely without touching the Secret.
          env:
            # Haiku 4.5: strong tool-calling, ~10x cheaper than Sonnet/Opus.
            # The agent is the volume driver (~2 LLM calls / 30s cycle), so this
            # is the biggest cost lever. SOUL.md + tools are prompt-cached and
            # the triage pass only fires on detection hits, so per-cycle cost is
            # mostly the (now-Haiku, cached) detection pass. Revert to
            # claude-sonnet-4-6 if triage card quality regresses.
            - name: LLM_MODEL
              value: claude-haiku-4-5-20251001
            # Task #55: route the agent's Anthropic SDK calls through the
            # local DefenseClaw guardrail proxy instead of going direct to
            # api.anthropic.com. Closes the indirect-injection / blast-radius
            # gap — the bot's LLM is already proxied via OpenClaw's fetch
            # interceptor; this brings the agent (which uses AsyncAnthropic
            # directly) to the same governance posture. The SDK reads this
            # env var natively (anthropic/_client.py:222). Same network
            # namespace as the sidecar, so 127.0.0.1:4000 reaches the proxy.
            - name: ANTHROPIC_BASE_URL
              value: http://127.0.0.1:4000
            # Task #1: the openai/vLLM path posts to the LLM guardrail SHIM in the
            # DefenseClaw sidecar (loopback :4100), NOT direct to the box. The shim
            # inspects the prompt (/api/v1/inspect/request) + forwards to the box
            # holding the vLLM token — so the agent holds no token and the SIDECAR
            # egresses to the box. (DefenseClaw's own :4000 proxy can't route to a
            # custom vLLM host — hence the first-party shim; see kl-governance/
            # llm_shim.py + k8s/README.md.) This target is STATIC.
            - name: LLM_BASE_URL
              value: http://127.0.0.1:4100/v1
            # Qwen3 DENSE models (Qwen3-32B) are hybrid-thinking; disable it so the
            # structured detection runs in direct non-thinking mode. Only affects
            # the openai/vLLM path; non-thinking models ignore the kwarg harmlessly.
            - name: VLLM_DISABLE_THINKING
              value: "true"
            # Provider + model are toggled LIVE (no pod restart) via kl-triage-config
            # ConfigMap files, resolved fresh each cycle:
            #   /config/llm_provider   anthropic | openai
            #   /config/vllm_model     Qwen/Qwen3-30B-A3B-Instruct-2507-FP8
            # The BOX url lives in the ConfigMap key `vllm_target` and is read by the
            # SHIM (sidecar), not the agent — so a relaunched box (new IP) is a
            # ConfigMap patch with no restart. Absent files → env defaults
            # (LLM_PROVIDER defaults to anthropic). Flip-back to anthropic is instant.
            - name: SOUL_PATH
              value: /config/SOUL.md
            - name: STORE_REGISTRY_PATH
              value: /config/store_registry.json
            - name: SPLUNK_TOOL_NAME
              value: splunk_run_query
            - name: SPLUNK_ROW_LIMIT
              value: "1000"
            # --- Phase 2 of B′-2 RE-ENGAGED 2026-05-18 with proxy v1+prewarm ---
            # Inline env OVERRIDES the same-named keys from kl-triage-secrets
            # (k8s rule: env wins over envFrom on key collision). The agent's
            # mcp-remote now connects to the proxy on 127.0.0.1:8788/sse
            # instead of bob directly. The proxy holds the bob bearer token
            # in its own secret (kl-sidecar-splunk-secrets) and forwards each
            # call upstream while emitting governance.tool_call events.
            # --allow-http is required because the proxy is plain HTTP (no TLS;
            # intra-pod loopback only). Rollback: comment these two out, apply.
            - name: SPLUNK_MCP_COMMAND
              value: npx
            - name: SPLUNK_MCP_ARGS
              value: "-y mcp-remote http://127.0.0.1:8788/sse --allow-http"
            - name: POLL_INTERVAL_SECONDS
              value: "30"
            - name: EARLIEST_TIME
              value: "-5m"
            - name: LATEST_TIME
              value: now
            - name: SPLUNK_BASE_URL
              value: https://splunk.example.com
            - name: MERAKI_BASE_URL
              value: https://dashboard.meraki.com
            - name: HEARTBEAT_FILE
              value: /tmp/agent-heartbeat
            # Opt-in HTTP /state endpoint for the triage_mcp companion service.
            # Set to 0 (or unset) to disable. See triage_mcp.py for the
            # consumer side and how the bot uses this for "what is the agent
            # currently working on?" questions.
            - name: AGENT_STATE_PORT
              value: "8080"
            # --- Task #56 stage 1: the agent reads its OWN alert history ---
            # A SECOND MCP client, DIRECT to the triage-mcp Service (same ns),
            # calling get_alert_history. This is separate from the bob data plane
            # above (127.0.0.1:8788 sidecar proxy) — triage-mcp holds the linda
            # credential and governs the resulting SPL via its own sidecar, and
            # the agent inspects this outbound call at its own boundary
            # (mcp_inspect → 127.0.0.1:18970). No credential lands in the agent.
            # Cilium triage-mcp-ingress allows kl-triage-agent → triage-mcp:8081.
            - name: HISTORY_ENABLED
              value: "true"
            - name: HISTORY_MCP_COMMAND
              value: npx
            - name: HISTORY_MCP_ARGS
              value: "-y mcp-remote http://triage-mcp:8081/sse --allow-http"
            - name: HISTORY_MCP_TOOL
              value: get_alert_history
            # 7-day window for recurrence context (#56 stage 2); capped by
            # k8s_ws_logs retention, so you get whatever's available.
            - name: HISTORY_LOOKBACK_HOURS
              value: "168"
            # Re-fetch history this often so the recurrence summary stays current.
            - name: HISTORY_REFRESH_SECONDS
              value: "600"
            # Task #69a: durable token-usage capture. The agent drops one JSON
            # file per usage event into this shared spool; the sidecar drains it
            # to linda HEC. The agent holds NO HEC/Splunk credential — the
            # sidecar (sole linda egress) does the POST. Unset this to fall back
            # to stdout-only (lossy filelog) capture.
            - name: USAGE_SPOOL_DIR
              value: /var/run/usage
            # Task #70: per-workload identity stamped into usage events so the
            # token dashboard distinguishes multiple agents/bots. Matches the
            # sidecar's DEFENSECLAW_AGENT_ID. A second agent gets a distinct id.
            - name: WORKLOAD_ID
              value: kl-triage-agent
            - name: WORKLOAD_NAME
              value: "KL Triage Agent"
            - name: WORKLOAD_KIND
              value: agent
            # Shared with the bot (identical value on both) → the dashboard pairs
            # this agent + its bot as one fleet. A second deployment gets its own.
            - name: WORKLOAD_FLEET
              value: kl-triage
            - name: WORKLOAD_FLEET_NAME
              value: "KL Triage"
          ports:
            - name: state
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            # Task #55: read-only view of the shared in-memory volume the
            # sidecar writes identity.json into. main.py reads the gateway
            # token from here to build the X-DC-Auth header that authenticates
            # LLM calls to the local DefenseClaw proxy.
            - name: sidecar-identity
              mountPath: /var/run/sidecar-identity
              readOnly: true
            # Task #69a: writable spool the agent drops usage-event JSON into;
            # the sidecar drains it to linda HEC (see USAGE_SPOOL_DIR).
            - name: usage-spool
              mountPath: /var/run/usage
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # No HTTP server on this workload — liveness is the freshness of the
          # heartbeat file the poll loop touches each cycle. If poll_once hangs,
          # the file goes stale and the pod is restarted.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'test $(( $(date +%s) - $(stat -c %Y /tmp/agent-heartbeat 2>/dev/null || echo 0) )) -lt 150'
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

        # --- DefenseClaw sidecar (Path B′-2 Phase 1: proxy enabled) -------
        # Runs defenseclaw-gateway daemon AND the MCP proxy (mcp_proxy.py
        # baked into the image when MCP_PROXY_ENABLED=true). The proxy listens
        # on 127.0.0.1:8788 inside the pod and exposes splunk_run_query as a
        # FastMCP SSE endpoint. Bob bearer token lives in this container's
        # env via kl-sidecar-splunk-secrets — NOT in the agent's secret.
        #
        # Phase 1 (current): agent still talks directly to bob; proxy runs
        # idle. Validates the proxy starts cleanly under cluster conditions.
        # Phase 2 will flip the agent's SPLUNK_MCP_ARGS to point here.
        - name: defenseclaw-sidecar
          image: localhost:5000/kl-defenseclaw-sidecar:latest
          imagePullPolicy: Always
          # SPLUNK_MCP_COMMAND / SPLUNK_MCP_ARGS (incl. bob bearer token) /
          # SPLUNK_MCP_ENV come from this secret. NEVER put them inline.
          envFrom:
            - secretRef:
                name: kl-sidecar-splunk-secrets
            # Task #39: SPLUNK_HEC_TOKEN for the audit_sinks block in
            # config.yaml — the daemon resolves it via splunk_hec.token_env
            # to push every guardrail/inspect/scan audit event to linda HEC.
            # Even though THIS sidecar has no openclaw peer (so few events
            # to emit), keeping config + env consistent across both pods
            # avoids drift if we later add policy-hook for the MCP proxy.
            # Provision: kubectl create secret generic kl-defenseclaw-secrets \
            #   -n net-triage-agent --from-literal=SPLUNK_HEC_TOKEN='<token>'
            - secretRef:
                name: kl-defenseclaw-secrets
          env:
            # Triggers the entrypoint to launch mcp_proxy.py alongside
            # defenseclaw-gateway. Without this the proxy code is in the
            # image but dormant (the kl-openclaw pod's sidecar leaves it off).
            - name: MCP_PROXY_ENABLED
              value: "true"
            # Bind loopback only — same net-ns as triage-agent container
            # means localhost reaches the proxy. No NetworkPolicy needed for
            # intra-pod traffic; 127.0.0.1 keeps it off the pod IP entirely.
            - name: MCP_PROXY_HOST
              value: 127.0.0.1
            - name: MCP_PROXY_PORT
              value: "8788"
            # Upstream tool name on bob — same as the agent's SPLUNK_TOOL_NAME.
            - name: SPLUNK_TOOL_NAME
              value: splunk_run_query
            # Per-pod identity for DefenseClaw audit attribution (event.agent_name).
            # Entrypoint appends these as a top-level agent: block in config.yaml.
            - name: DEFENSECLAW_AGENT_ID
              value: kl-triage-agent
            - name: DEFENSECLAW_AGENT_NAME
              value: "KL Triage Agent"
            # Governance telemetry: turn ON DefenseClaw's native OTLP export
            # (metrics) — the entrypoint appends the otel: block from this flag.
            # Endpoint = the node's OTel-agent OTLP receiver (K8S_NODE_IP:4317 via
            # downward API); the cluster collector fans it out to O11y + linda.
            # Per-workload — bot/triage-mcp stay off until they set this too.
            - name: DEFENSECLAW_OTEL_ENABLED
              value: "true"
            - name: K8S_NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            # Token-metrics: turn ON the usage relay's OTLP token emitter. The
            # relay reads the same #69a spool and, per event, increments cumulative
            # kl_llm_* counters (cost priced from MODEL_PRICES_PATH) and pushes them
            # via OTLP to K8S_NODE_IP:4317 → O11y + linda k8s_ws_metrics (the same
            # collector path DefenseClaw governance metrics use). Needs K8S_NODE_IP
            # (above) + the host:4317 Cilium egress rule. Off → HEC drain only.
            - name: KL_TOKEN_OTLP_ENABLED
              value: "true"
            - name: MODEL_PRICES_PATH
              value: /etc/kl/model_prices.json
            # Task #69a: the sidecar drains this shared spool (written by the
            # agent) and POSTs each usage event to linda HEC using the
            # SPLUNK_HEC_TOKEN it already holds (kl-defenseclaw-secrets). The
            # entrypoint's usage-relay loop activates because this is set + the
            # HEC token is present. Disable with USAGE_RELAY_ENABLED=false.
            - name: USAGE_SPOOL_DIR
              value: /var/run/usage
            # Task #1: LLM guardrail shim. Governs the agent's self-hosted vLLM
            # calls (the agent posts to 127.0.0.1:4100; the shim inspects via
            # /api/v1/inspect/request + forwards to the box holding the token).
            - name: LLM_SHIM_ENABLED
              value: "true"
            - name: LLM_SHIM_PORT
              value: "4100"
            # Box /v1 base URL — read LIVE from the kl-triage-config ConfigMap key
            # `vllm_target` (mounted at /config below), so a relaunched box (new
            # IP) is a ConfigMap patch, no restart. Set it with:
            #   kubectl -n net-triage-agent patch configmap kl-triage-config \
            #     --type merge -p '{"data":{"vllm_target":"http://<box-ip>:8000/v1"}}'
            - name: VLLM_TARGET_FILE
              value: /config/vllm_target
            # Inspect scan tuning vs DefenseClaw's HARD 200ms scan budget: how many
            # bytes of the (untrusted user) prompt the shim sends to
            # /api/v1/inspect/request. The SOUL system prompt is never sent (trusted
            # + halves the payload). Lower this if inspects still 504 (fail-open,
            # un-inspected); raise if shim.inspect.sent shows headroom. Env-tunable
            # via a rollout — no image rebuild.
            - name: DEFENSECLAW_INSPECT_MAX_CHARS
              value: "24000"
            # vLLM upstream token — the SIDECAR holds it (agent never does). Task #2:
            # wired from the kl-vllm-secrets Secret. `optional: true` keeps this safe
            # to apply during the live soak: if the Secret is absent (or the box is
            # still keyless) VLLM_API_KEY is simply unset and the shim sends no
            # Authorization — no CreateContainerConfigError, no broken poll loop. Once
            # the Secret exists AND the box enforces --api-key, roll the pod to pick it
            # up, then verify the box 401s an un-authenticated request (proves auth is
            # actually enforced, not just that a header is sent).
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kl-vllm-secrets
                  key: VLLM_API_KEY
                  optional: true
          ports:
            - name: guardrail
              containerPort: 4000
            - name: sidecar-api
              containerPort: 18970
            # LLM shim listener (127.0.0.1 only — declared for topology clarity).
            - name: llm-shim
              containerPort: 4100
            # Proxy listener (127.0.0.1 only — not really reachable via this
            # port name, but declaring it makes the topology self-documenting).
            - name: mcp-proxy
              containerPort: 8788
          volumeMounts:
            - name: defenseclaw-state
              mountPath: /defenseclaw/.defenseclaw
            # Task #1: read-only view of the kl-triage-config ConfigMap so the LLM
            # shim can read the live box URL from /config/vllm_target (ConfigMap
            # edits propagate here → new box IP with no restart). Same ConfigMap the
            # agent mounts; SOUL.md etc. are just unused by the sidecar.
            - name: config
              mountPath: /config
              readOnly: true
            # Task #55: writable mount of the shared in-memory volume. The
            # entrypoint derives identity.json (deviceId + gateway token) here
            # once the gateway has booted, for the agent container to consume.
            - name: sidecar-identity
              mountPath: /var/run/sidecar-identity
            # Task #69a: shared spool the agent writes usage events into; the
            # entrypoint's relay loop drains it to linda HEC.
            - name: usage-spool
              mountPath: /var/run/usage
            # Token-metrics: per-MTok model prices for the relay's OTLP cost
            # enrichment (kl_llm_cost_usd_total). ConfigMap → live-reloaded; a
            # price change is forward-only (mounted RO).
            - name: model-prices
              mountPath: /etc/kl
              readOnly: true
          resources:
            requests:
              cpu: 150m         # +50m for the Python proxy idle
              memory: 256Mi     # Python + mcp SDK + Go gateway resident at idle
            limits:
              # 2000m (task #1): the LLM shim's inspect call has a HARD 200ms
              # wall-clock scan budget in DefenseClaw; at 1000m it was starved
              # during the drill-cycle Node subprocess storm → 504 → fail-open.
              # More CPU headroom lets the scan complete in-budget.
              cpu: 2000m        # was 1000m; +Node mcp-remote subprocesses (one per agent call) + inspect scan
              # Per-call model spawns one `npx mcp-remote` Node process (~100-150Mi)
              # per splunk_run_query; a drill cycle fires up to ~9 concurrently. At
              # 512Mi the proxy was OOM-killed (SIGKILL) under that load → sidecar
              # CrashLoopBackOff → agent ECONNREFUSED on :8788. 1.5Gi gives headroom
              # for peak concurrent subprocesses + Python proxy + Go gateway daemon.
              # Real fix is task #35 (drop npx, reuse one mcp-remote) — this is the stopgap.
              memory: 1536Mi
          # Same loopback issue as kl-openclaw pod — sidecar's /health binds
          # 127.0.0.1, so a kubelet httpGet to the pod IP gets refused. Use
          # exec+curl over loopback so the probe runs inside the container.
          # Probes check the gateway's /health, NOT the proxy. We deliberately
          # don't fail the pod on proxy crash in Phase 1 (the agent doesn't
          # depend on it yet). When Phase 2 lands, add an additional probe
          # against 127.0.0.1:8788/sse to fail-fast on proxy outage.
          livenessProbe:
            exec:
              command: ["curl", "-fsS", "--max-time", "4", "http://127.0.0.1:18970/health"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["curl", "-fsS", "--max-time", "4", "http://127.0.0.1:18970/health"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: kl-triage-config
        - name: defenseclaw-state
          persistentVolumeClaim:
            claimName: defenseclaw-state
        # Task #55: pod-local tmpfs the sidecar writes identity.json into and
        # the agent reads the gateway token from. Memory-backed + 1Mi cap +
        # never persisted — mirrors the kl-openclaw pod's identity-sharing
        # pattern (task #29). The token never touches disk.
        - name: sidecar-identity
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        # Task #69a: pod-local spool shared agent(rw)→sidecar(drain). Memory-
        # backed (small JSON files, drained every ~15s) + capped. Not persisted:
        # any undrained file on pod teardown is at most a few seconds of usage
        # events, and the relay's spool cap bounds growth during a HEC outage.
        - name: usage-spool
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
        # Token-metrics: per-MTok model prices consumed by the sidecar usage
        # relay's OTLP cost enrichment. Shared shape with the bot (kl-governance);
        # apply k8s/model-prices-configmap.yaml. Editing the ConfigMap reprices
        # forward-only (no restart — the relay mtime-reloads it).
        - name: model-prices
          configMap:
            name: kl-model-prices
