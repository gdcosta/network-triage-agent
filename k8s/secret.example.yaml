# TEMPLATE — do not commit a filled-in copy of this file.
#
# Two ways to create the real Secret:
#
#  A) Imperatively from your local .env values (recommended — nothing on disk):
#       kubectl create secret generic kl-triage-secrets \
#         --namespace net-triage-agent \
#         --from-literal=ANTHROPIC_API_KEY='sk-ant-...' \
#         --from-literal=TEAMS_WEBHOOK_URL='https://...' \
#         --from-literal=SPLUNK_MCP_COMMAND='npx' \
#         --from-literal=SPLUNK_MCP_ARGS='-y mcp-remote https://splunk-mcp.example.com:8089/services/mcp --header "Authorization: Bearer <token>"' \
#         --from-literal=SPLUNK_MCP_ENV='NODE_TLS_REJECT_UNAUTHORIZED=0'
#
#  B) Copy this file to secret.yaml (gitignored), fill in stringData, then:
#       kubectl apply -f k8s/secret.yaml
#
# The SPLUNK_MCP_* values are the same strings as in the local .env — the image
# bakes in `mcp-remote`, so `npx -y mcp-remote ...` resolves the global install
# with no registry fetch at pod start.
apiVersion: v1
kind: Secret
metadata:
  name: kl-triage-secrets
  namespace: net-triage-agent
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  TEAMS_WEBHOOK_URL: "REPLACE_ME"
  SPLUNK_MCP_COMMAND: "npx"
  SPLUNK_MCP_ARGS: '-y mcp-remote https://splunk-mcp.example.com:8089/services/mcp --header "Authorization: Bearer REPLACE_ME"'
  SPLUNK_MCP_ENV: "NODE_TLS_REJECT_UNAUTHORIZED=0"
